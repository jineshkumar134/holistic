<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <!-- P21 Learning Framework Skills Wheel -->
  <!-- Outer Ring: Support Systems -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#f0f4f8" stroke-width="4" />
  
  <!-- Colored Slices (Simplified Wheel) -->
  <!-- Life & Career (Red/Coral) -->
  <path d="M 50 10 A 40 40 0 0 1 90 50 L 50 50 Z" fill="#ef4444" fill-opacity="0.9" />
  <!-- Learning & Innovation (4Cs) (Green) -->
  <path d="M 90 50 A 40 40 0 0 1 50 90 L 50 50 Z" fill="#10b981" fill-opacity="0.9" />
  <!-- Info, Media & Tech (Yellow/Gold) -->
  <path d="M 50 90 A 40 40 0 0 1 10 50 L 50 50 Z" fill="#f59e0b" fill-opacity="0.9" />
  <!-- Core Subjects (Blue) -->
  <path d="M 10 50 A 40 40 0 0 1 50 10 L 50 50 Z" fill="#3b82f6" fill-opacity="0.9" />
  
  <!-- Inner Core -->
  <circle cx="50" cy="50" r="15" fill="#ffffff" />
  <circle cx="50" cy="50" r="10" fill="#1e293b" />
  
  <!-- White Separators -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="white" stroke-width="1" />
  <line x1="10" y1="50" x2="90" y2="50" stroke="white" stroke-width="1" />
  
  <!-- P21 Mini Arc Label -->
  <path d="M 40 10 A 10 10 0 0 1 60 10" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
</svg>
