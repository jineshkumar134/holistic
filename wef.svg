<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" preserveAspectRatio="xMidYMid meet">
  <!-- WORLD ECONOMIC FORUM Typographic Logo -->
  <style>
    .text { font-family: 'Helvetica', 'Arial', sans-serif; font-weight: 700; letter-spacing: -0.05em; line-height: 1; }
  </style>
  
  <!-- WEF Identity Colors -->
  <rect width="100" height="80" rx="14" fill="#034ea2" /> 
  
  <text x="50" y="30" text-anchor="middle" font-size="12" fill="#ffffff" class="text">WORLD</text>
  <text x="50" y="45" text-anchor="middle" font-size="12" fill="#ffffff" class="text">ECONOMIC</text>
  <text x="50" y="60" text-anchor="middle" font-size="12" fill="#ffffff" class="text">FORUM</text>
  
  <!-- The Signature WEF Swoosh/Arc -->
  <path d="M 25 20 C 15 40 15 60 45 70" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>
